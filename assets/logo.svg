<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">confluence2md logo</title>
  <desc id="desc">A blue abstract document icon, a right arrow, a dark markdown file icon, and the text confluence2md, on white background.</desc>

  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#2FA3FF"/>
    </linearGradient>

    <linearGradient id="darkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3C3C3F"/>
      <stop offset="100%" stop-color="#4B4B50"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect x="0" y="0" width="1024" height="1024" fill="#FFFFFF"/>

  <g transform="translate(-20 100)">
    <g filter="url(#softShadow)">
      <!-- Left icon: abstract structured page -->
      <path d="
        M90 150
        C90 128 108 110 130 110
        L355 110
        L440 195
        L440 505
        C440 527 422 545 400 545
        L130 545
        C108 545 90 527 90 505
        Z"
        fill="url(#blueGrad)"/>

      <path d="M355 110 L440 195 L372 195 C362 195 355 188 355 178 Z"
        fill="#8FD0FF" fill-opacity="0.55"/>

      <!-- White lines -->
      <g fill="none" stroke="#F4F7F9" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M150 220 H310"/>
        <path d="M150 315 H215 C254 315 262 285 308 285 H380"/>
        <path d="M150 385 H235 C272 385 280 355 326 355 H382"/>
        <path d="M150 455 H220 C268 455 276 425 332 425 H390"/>
      </g>

      <!-- Arrow -->
      <g fill="url(#blueGrad)">
        <rect x="490" y="310" width="116" height="30" rx="3"/>
        <path d="M555 250 L655 325 L555 400 L528 373 L588 325 L528 277 Z"/>
      </g>

      <!-- Right icon: markdown file -->
      <path d="
        M690 150
        C690 128 708 110 730 110
        L905 110
        L975 180
        L975 505
        C975 527 957 545 935 545
        L730 545
        C708 545 690 527 690 505
        Z"
        fill="url(#darkGrad)"/>

      <path d="M905 110 L975 180 L920 180 C911 180 905 174 905 165 Z"
        fill="#B9BDC3" fill-opacity="0.82"/>

      <text x="730" y="460"
        font-size="350"
        font-weight="900"
        font-family="JetBrains Mono, Fira Code, SFMono-Regular, Consolas, Menlo, monospace"
        fill="#FFFFFF">#</text>
    </g>

    <!-- Wordmark -->
    <text x="78" y="690"
      font-size="118"
      font-weight="800"
      font-family="JetBrains Mono, Fira Code, SFMono-Regular, Consolas, Menlo, monospace"
      letter-spacing="-4">
      <tspan fill="url(#blueGrad)">confluence</tspan><tspan fill="#66666A">2md</tspan>
    </text>
  </g>
</svg>

