[tools]
"cargo:cargo-machete" = "0.8.0"
"rust" = { version = "1.95.0", profile = "default" }

[tasks.ci]
description = "Run all CI checks: fmt, clippy, build, test, machete"
run = [
  "cargo fmt --all -- --check",
  "cargo clippy --all-targets -- -D warnings",
  "cargo build",
  "cargo test --all-targets",
  "cargo machete",
]
